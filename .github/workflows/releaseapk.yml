name: Release APK Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Write keystore.properties
        run: |
          cat > ./keystore.properties <<'EOF'
          storePassword=Sh@090609
          keyPassword=Sh@090609
          keyAlias=my-key
          storeFile=release.jks
          EOF

      - name: Build signed release APK
        id: build
        run: ./gradlew :app:assembleGithubRelease --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/github/release -name "*.apk" ! -name "*-unsigned*" | head -n 1)
          echo "Found APK at $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload release APK as workflow artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: plainapp-release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 90

      - name: Get APK info
        id: apk-info
        run: |
          APK_PATH="${{ steps.apk.outputs.path }}"
          APK_SIZE=$(stat -c%s "$APK_PATH")
          APK_SIZE_MB=$(echo "scale=2; $APK_SIZE / 1048576" | bc)
          echo "apk_size=$APK_SIZE_MB MB" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release-notes
        run: |
          DATE=$(date +'%B %d, %Y')
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)

          RELEASE_BODY="## 📱 PlainApp v$VERSION

          **Release Date:** $DATE

          ### 📱 What's New
          - Latest signed production build
          - Includes all recent features, fixes and improvements
          - Optimized and ready for everyday use

          ### 📦 Package Details
          - **Version:** $VERSION
          - **Build Type:** Release (signed)
          - **File Size:** ${{ steps.apk-info.outputs.apk_size }}
          - **Platform:** Android 8.0+ (API 26+)
          - **Commit:** \`${{ github.sha }}\`

          ### 🚀 Features
          - Self-hosted web console served from your phone
          - Cloudflare Tunnel built in — reach the console from anywhere on your own domain
          - Live camera, microphone and screen-mirror streaming to the web panel
          - Files, contacts, SMS, call log, notifications and audio player from the browser
          - Optional in-app PIN / biometric lock with PIN-protected Device Admin deactivation
          - Hide launcher icon while keeping every background service running

          ### ⚠️ Important Notes
          - Signed release build — safe to install over previous releases
          - Enable \"Install from Unknown Sources\" on your device
          - Grant storage, notification, camera and microphone permissions when prompted

          ### 📥 Installation
          1. Download the APK file below
          2. Enable installation from unknown sources for your browser/file manager
          3. Install and open PlainApp; finish the in-app setup

          ---
          **Repository:** [GitHub](https://github.com/${{ github.repository }})"

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-release
          name: PlainApp Release Build ${{ github.run_number }}
          body: ${{ steps.release-notes.outputs.body }}
          files: |
            ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
