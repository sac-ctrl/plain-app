name: Debug APK Build

on:
  push:
    branches: [main, master]
    tags: ['v*-debug']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        id: build
        run: ./gradlew :app:assembleGithubDebug --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/github/debug -name "*.apk" | head -n 1)
          echo "Found APK at $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK as workflow artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: plainapp-debug-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 90

      - name: Get APK info
        id: apk-info
        run: |
          APK_PATH="${{ steps.apk.outputs.path }}"
          APK_SIZE=$(stat -c%s "$APK_PATH")
          APK_SIZE_MB=$(echo "scale=2; $APK_SIZE / 1048576" | bc)
          echo "apk_size=$APK_SIZE_MB MB" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release-notes
        run: |
          DATE=$(date +'%B %d, %Y')
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)

          RELEASE_BODY="## 🛠️ PlainApp Debug v$VERSION

          **Build Date:** $DATE

          ### 📱 What's In This Build
          - Latest **debug** build straight from \`${{ github.ref_name }}\`
          - Includes all in-progress features, fixes and experiments
          - Suitable for testing — install side-by-side with the release build (\`.debug\` package suffix)

          ### 📦 Package Details
          - **Version:** $VERSION (debug)
          - **Build Type:** Debug (unsigned, debuggable)
          - **File Size:** ${{ steps.apk-info.outputs.apk_size }}
          - **Platform:** Android 8.0+ (API 26+)
          - **Commit:** \`${{ github.sha }}\`

          ### 🚀 Features
          - Self-hosted web console served from your phone
          - Cloudflare Tunnel built in — reach the console from anywhere on your own domain
          - Live camera, microphone and screen-mirror streaming to the web panel
          - Files, contacts, SMS, call log, notifications and audio player from the browser
          - Optional in-app PIN / biometric lock with PIN-protected Device Admin deactivation
          - Hide launcher icon while keeping every background service running

          ### ⚠️ Important Notes
          - This is a **debug** build — verbose logs are enabled and the package id ends in \`.debug\`, so it installs alongside the release build instead of replacing it
          - Enable \"Install from Unknown Sources\" on your device
          - Grant storage, notification, camera and microphone permissions when prompted

          ### 📥 Installation
          1. Download the APK file below
          2. Enable installation from unknown sources for your browser/file manager
          3. Install and open PlainApp; sign-in flow is the standard PIN setup

          ---
          **Repository:** [GitHub](https://github.com/${{ github.repository }})"

          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-debug
          name: PlainApp Debug Build ${{ github.run_number }}
          body: ${{ steps.release-notes.outputs.body }}
          files: |
            ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
