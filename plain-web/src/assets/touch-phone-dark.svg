<svg viewBox="110 70 180 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow-dark" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="7" />
      <feOffset dx="0" dy="10" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @keyframes finger-slide {
        0% { transform: translate(120px, 150px); opacity: 0; }
        20% { transform: translate(0, 0); opacity: 0.55; }
        40%, 60% { transform: translate(0, 0) scale(0.85); opacity: 0.85; }
        80% { transform: translate(0, 0); opacity: 0; }
        100% { transform: translate(120px, 150px); opacity: 0; }
      }

      @keyframes btn-press {
        0%, 35%, 65%, 100% { transform: scale(1); }
        45%, 55% { transform: scale(0.92); }
      }

      @keyframes check-pop {
        0%, 45% { transform: scale(0); opacity: 0; }
        60%, 100% { transform: scale(1); opacity: 1; }
      }

      @keyframes ripple-out {
        0%, 45% { transform: scale(0.5); opacity: 0; }
        50% { opacity: 0.36; }
        75%, 100% { transform: scale(2); opacity: 0; }
      }

      .touch-point { transform-origin: 200px 260px; animation: finger-slide 3s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95); }
      .btn-unit { transform-origin: 200px 260px; animation: btn-press 3s infinite ease-in-out; }
      .check-icon { transform-origin: 200px 260px; animation: check-pop 3s infinite cubic-bezier(0.17, 0.67, 0.83, 0.67); }
      .ripple { transform-origin: 200px 260px; animation: ripple-out 3s infinite ease-out; }
    </style>
  </defs>

  <g filter="url(#shadow-dark)">
    <rect x="135" y="80" width="130" height="240" rx="32" fill="#17181C" />
    <rect x="142" y="87" width="116" height="226" rx="26" fill="#23262D" />
  </g>

  <rect x="180" y="98" width="40" height="10" rx="5" fill="#5A6272" opacity="0.9" />

  <circle class="ripple" cx="200" cy="260" r="25" fill="#4F97FF" />
  <rect x="160" y="135" width="80" height="6" rx="3" fill="#687080" opacity="0.5" />
  <rect x="160" y="150" width="50" height="6" rx="3" fill="#687080" opacity="0.3" />
  <g class="btn-unit">
    <rect x="155" y="235" width="90" height="50" rx="25" fill="#4F97FF" />
    <path class="check-icon" d="M188 260 l8 8 l14 -14" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g class="touch-point">
    <circle cx="200" cy="260" r="24" fill="#4F97FF" opacity="0.45" />
    <circle cx="200" cy="260" r="12" fill="#FFFFFF" opacity="0.35" />
  </g>
</svg>
