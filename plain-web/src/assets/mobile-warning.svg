<svg viewBox="110 70 180 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" />
      <feOffset dx="0" dy="8" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.1" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @keyframes subtle-shake {
        0%, 70%, 100% { transform: translateX(0); }
        75%, 85%, 95% { transform: translateX(-3px); }
        80%, 90% { transform: translateX(3px); }
      }

      @keyframes breathe {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.15); }
      }

      @keyframes icon-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
      }

      .btn-container { transform-origin: 200px 260px; animation: subtle-shake 2.5s infinite ease-in-out; }
      .breathe-circle { transform-origin: 200px 260px; animation: breathe 2s infinite ease-in-out; }
      .alert-icon { transform-origin: 200px 260px; animation: icon-float 2s infinite ease-in-out; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="135" y="80" width="130" height="240" rx="32" fill="#FFFFFF" />
    <rect x="142" y="87" width="116" height="226" rx="26" fill="#FBFBFD" />
  </g>

  <rect x="180" y="98" width="40" height="10" rx="5" fill="#E5E5EA" />
  <rect x="165" y="140" width="70" height="6" rx="3" fill="#E5E5EA" opacity="0.6" />
  <rect x="165" y="155" width="40" height="6" rx="3" fill="#E5E5EA" opacity="0.3" />
  <g class="btn-container">
    <circle class="breathe-circle" cx="200" cy="260" r="38" fill="#FF9500" />

    <rect x="155" y="235" width="90" height="50" rx="25" fill="#FF9500" />

    <g class="alert-icon">
      <rect x="198" y="248" width="4" height="14" rx="2" fill="white" />
      <circle cx="200" cy="270" r="2.5" fill="white" />
    </g>
  </g>

</svg>
